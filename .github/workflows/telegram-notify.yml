name: Telegram notifications

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: read

jobs:
  notify:
    name: Notify Telegram
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.event.compare }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets are unavailable; skipping notification."
            exit 0
          fi

          if [ "$EVENT_NAME" = "push" ]; then
            message=$(printf '📌 %s 有新提交\n作者：%s\n%s\n%s' \
              "$REPOSITORY" "$ACTOR" "$COMMIT_MESSAGE" "$COMMIT_URL")
          else
            message=$(printf '🔀 %s PR #%s（%s）\n%s\n作者：%s\n%s' \
              "$REPOSITORY" "$PR_NUMBER" "$EVENT_ACTION" "$PR_TITLE" "$PR_AUTHOR" "$PR_URL")
          fi

          curl --fail --silent --show-error \
            --request POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${message}"
